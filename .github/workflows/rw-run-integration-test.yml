# A reusable workflow that runs tests on the code.
name: Run Integration Test

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'The image version tag for the base builder to pull.'
        type: string
        required: true
      system_settings_override:
        description: 'A JSON file that contains overrides for the system.json.settings file.'
        type: string
        required: false
        default: '.github/workflows/ci-general.overrides.json'
      config_to_run:
        description: 'The configuration to to run for the integration tests.'
        type: string
        required: true
      iterations:
        description: 'The number of iterations to run for the integration test.'
        type: string
        required: false
        default: "1"
      build_type:
        description: 'The type of build to base the tests on. "release" or "debug". The type of build need to match the base image type.'
        type: string
        required: true
        default: "debug"
      timeout_minutes:
        description: 'The timeout in minutes for the entire job.'
        type: number
        required: false
        default: 60
      reuse_code:
        description: 'Whether to reuse the existing code from /home/dev/springtail or do a fresh checkout.'
        type: boolean
        required: false
      snapshot_alias:
        description: 'Only used if reuse_code is true. The snapshot alias to use for the runner.'
        type: string
        required: false
        default: ""
      num_procs:
        description: 'The number of parallel processes to use for rebuilding. Only used if reuse_code is false.'
        type: string
        required: false
        default: "4"
      run_proxy_test:
        description: 'Whether to run the proxy test or not.'
        type: boolean
        required: false
        default: false
    outputs:
      skipped_tests:
        description: "The number of skipped tests during the integration tests."
        value: ${{ jobs.test.outputs.skipped_tests }}

  workflow_dispatch:

jobs:
  test:
    name: integration-test
    runs-on: ubuntu-22.04-arm
    timeout-minutes: ${{ inputs.timeout_minutes }}
    container:
      image: ghcr.io/springtail-inc/${{ inputs.image_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --init
        -v /var/run/docker.sock:/var/run/docker.sock
    outputs:
      skipped_tests: ${{ steps.run-test.outputs.skipped_tests }}
    env:
      CI_WORKSPACE: /__w/springtail/springtail
      CI_BUILD_TYPE: ${{ inputs.build_type }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      SYSTEM_SETTINGS_OVERRIDE: ${{ inputs.system_settings_override }}
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_ROOT: /home/dev/external/vcpkg
      DOCKER: 1
      ZIC: true
      USER: root
      PYTHONUNBUFFERED: 1
      GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_LATEST_SHA: ${{ github.event.pull_request.head.sha }}
      NUM_PROCS: ${{ inputs.num_procs }}
      INTEGRATION_TEST_CONFIG: ${{ inputs.config_to_run }}
      INTEGRATION_TEST_ITERATIONS: ${{ inputs.iterations }}
      SPRINGTAIL_LOG_PATH: /var/log/springtail.log
      DKR_VOLUME_NAME: pgdata-${{ github.run_id }}-${{ inputs.config_to_run }}
      DKR_NETWORK_NAME: cinet-${{ github.run_id }}-${{ inputs.config_to_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: inputs.reuse_code == false
        with:
          clean: true

      - name: Checkout workflow assets
        uses: actions/checkout@v4
        if: inputs.reuse_code == true
        with:
          clean: true
          path: .ci-workflow-assets
          sparse-checkout: |
            .github/workflows

      - name: Reuse existing code
        if: inputs.reuse_code == true
        run: |
          echo "Reusing existing code from /home/dev/springtail"
          rsync -a /home/dev/springtail/ .

      - name: Prepare Tests
        run: |
          git config --global --add safe.directory ${CI_WORKSPACE}
          workflow_repo_root="."
          if [ -d .ci-workflow-assets/.github/workflows ]; then
            workflow_repo_root=".ci-workflow-assets"
          fi
          merge_script="${workflow_repo_root}/.github/workflows/scripts/merge_system_settings.py"
          override_file="${SYSTEM_SETTINGS_OVERRIDE}"
          if [ ! -f "${override_file}" ] && [ -f "${workflow_repo_root}/${SYSTEM_SETTINGS_OVERRIDE}" ]; then
            override_file="${workflow_repo_root}/${SYSTEM_SETTINGS_OVERRIDE}"
          fi
          # Override some settings in the config file
          python3 "${merge_script}" system.json.settings "${override_file}" system.json.test

          mkdir -p /opt/springtail/pids
          # Make sure we are using the correct config for Redis
          /usr/bin/redis-server /etc/redis/redis.conf --daemonize yes
          
          # Copy over the fdw_config file to the designated location
          conf_file=/etc/postgresql/16/main/postgresql.conf
          fdw_config_file_path=$(grep -E "^springtail_fdw.config_file_path" $conf_file | awk '{print $3}' | tr -d "'")
          mkdir -p $(dirname $fdw_config_file_path)
          cp system.json.test $fdw_config_file_path
          
          ln -s /home/dev/debug debug
          ln -s /home/dev/release release
          ln -s /home/dev/install install
          ln -s /home/dev/external external

          # Set the build dir to ../../$CI_BUILD_TYPE in 
          # - python/testing/test_runner_config.yaml
          # - python/performance/performance_config.yaml
          # - python/benchmarks/config.yaml
          sed -i -e "s|^build_dir: .*|build_dir: ../../${CI_BUILD_TYPE}|" python/testing/test_runner_config.yaml
          sed -i -e "s|^build_dir: .*|build_dir: ../../${CI_BUILD_TYPE}|" python/performance/performance_config.yaml
          sed -i -e "s|^build_dir: .*|build_dir: ../../${CI_BUILD_TYPE}|" python/benchmarks/config.yaml

      - name: Rebuild
        if: inputs.reuse_code == false
        run: |
          cd ${CI_BUILD_TYPE}
          make -j${NUM_PROCS} 
          cd ..

      - name: Prepare shared Docker network
        run: |
          docker network create ${DKR_NETWORK_NAME}
          docker network connect ${DKR_NETWORK_NAME} $(hostname)  
          docker volume create ${DKR_VOLUME_NAME}

      - name: Start Postgres (Primary Database)
        run: |
          docker run -d \
            --name pg16 \
            --restart unless-stopped \
            --network ${DKR_NETWORK_NAME} \
            -p 5432:5432 \
            -e POSTGRES_USER=springtail \
            -e POSTGRES_PASSWORD=springtail \
            -e POSTGRES_DB=springtail \
            -v ${DKR_VOLUME_NAME}:/var/lib/postgresql/data \
            postgres:16 \
            postgres -c wal_level=logical \
            -c max_wal_senders=10 \
            -c max_replication_slots=10 \
            -c max_connections=100 \
            -c max_prepared_transactions=64
          
          # Wait for Postgres to be ready
          if ! timeout 15s bash -c '
            until PGPASSWORD=springtail psql -h pg16 -U springtail -d postgres -c "select 1" >/dev/null 2>&1; do
            echo "Waiting for Postgres to be ready..."
            sleep 3
            done
            '; then
            echo "Postgres did not become ready within 15s" >&2
            exit 1
          fi
          # Reset primary db
          PGPASSWORD=springtail psql -h pg16 -U springtail -d postgres -c "DROP DATABASE IF EXISTS springtail;"
          PGPASSWORD=springtail psql -h pg16 -U springtail -d postgres -c "CREATE DATABASE springtail;"
          
          # Starts FDW Postgres
          service postgresql start
          sleep 4

      - name: Run Integration Tests
        id: run-test
        run: |
          # Grab the short SHA
          _LOG_SHA=$(echo $GITHUB_LATEST_SHA | cut -c1-7)
          
          cd python/testing
          python3 ./springtail.py -f ../../system.json.test --load-redis --build-dir ../../${CI_BUILD_TYPE}
          python3 ./springtail.py -f ../../system.json.test --install-triggers --build-dir ../../${CI_BUILD_TYPE}
          if ! python3 ./springtail.py --start --startup-timeout 60 -f ../../system.json.test -b ../../${CI_BUILD_TYPE} -s data_init.sql; then
            echo "*** Startup failed, dumping daemon logs"
            output=$(python3 springtail.py --dump -f ../../system.json.test -b ../../${CI_BUILD_TYPE}) || true
            fname=$(echo $output | cut -f2 -d':' | xargs | head -1)
            if [ -f "$fname" ]; then
              mv $fname springtail-startup-failure-${_LOG_SHA}.tar.gz
            fi
            exit 1
          fi
          python3 ./springtail.py --start -f ../../system.json.test -b ../../${CI_BUILD_TYPE} --check
          
          # Run integration tests
          set +e
          for i in $(seq 1 ${INTEGRATION_TEST_ITERATIONS}) ; 
          do
            # Note: 
            # 1. there might be discrepancies between the _LOG_TIMESTAMP and the _LOG_DATE due to the time it takes to run the integration tests
            # it may run across a day. This is fine as long as the logs are grouped by _LOG_DATE
            # 2. the integration-test-report.xml will always be from the last iteration of the tests (overwritten each iteration)
          
            _LOG_FLAG="failed"
            echo "*** Starting iteration $i/${INTEGRATION_TEST_ITERATIONS} of integration tests"
            python3 test_runner.py -c ${{ inputs.config_to_run }} -j ${CI_WORKSPACE}/integration-test-report.xml 2>&1 | tee tmplog
            # Grab the success/failure status of the integration tests
            if [ $? -eq 0 ] && ! grep -qE "Tests failed: [1-9][0-9]*" tmplog
            then
              _LOG_FLAG="succeeded"
            fi
            # if the tmplog contains "Caught error" or "Exception: ", mark the test as failed
            if grep -qE "Caught error|Exception:" tmplog
            then
              _LOG_FLAG="failed"
            fi

            echo "skipped_tests=$(awk '/skipped:/ { for (i=1;i<=NF;i++) if ($i ~ /^[0-9]+$/) s+=$i } END{print s+0}' tmplog)" >> $GITHUB_OUTPUT
          
            echo "*** Finished iteration $i/${INTEGRATION_TEST_ITERATIONS} of integration tests"
          
            _TIMESTAMP=$(date +%s)
          
            # Save test logs locally for artifact upload
            mv tmplog integration-test-${_LOG_SHA}-${_LOG_FLAG}-${_TIMESTAMP}-${i}.log
          
            # Springtail service logs
            output=$(python3 springtail.py --dump -f ../../system.json.test -b ../../${CI_BUILD_TYPE})
            fname=$(echo $output  | cut -f2 -d':' | xargs | head -1)
            mv $fname springtail-${_LOG_SHA}-${_LOG_FLAG}-${_TIMESTAMP}-${i}.tar.gz
          
            # If the current iteration of test failed, break out of the loop for now
            if [ "$_LOG_FLAG" = "failed" ]; then
              echo "*** Integration test failed at iteration ${i}, breaking out of the loop"
              exit 1
            fi
          done

      - name: Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()                         # Only upload the *last* report
        with:
          name: "IT Report - ${{ inputs.config_to_run }}"      # Name of the check run which will be created
          path: ./integration-test-report.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: success() || failure()      # Only upload the *last* log file
        with:
          name: "Integration Test Logs - ${{ inputs.config_to_run }}"
          path: ./python/testing/integration-test-*.log

      - uses: actions/upload-artifact@v4
        if: success() || failure()      # Only upload the *last* springtail log file
        with:
          name: "Springtail Logs - ${{ inputs.config_to_run }}"
          path: ./python/testing/springtail-*.tar.gz

      - name: Run Proxy Test
        if: ${{ inputs.run_proxy_test }}
        run: |
          # TODO: After fixing the proxy test, we can enable the proxy test as part of the nightly test suite
          #   For now, we simply copy over the old code here. Need to examine this more closely.
          # Make sure Proxy `enable_ssl` is on 
          sed -i 's/enable_ssl": false/enable_ssl": true/g' system.json.test
          
          cd python/testing
          python3 springtail.py -f ../../system.json.test --kill --build-dir ../../debug
          
          if [ $? -ne 0 ]; then
            exit 1
          fi
          
          cd proxy
          # Do not break out if errors occur
          set +e
          _LOG_FLAG="failed"
          python3 test_runner_new.py -t -s postgres_all -b ../../../debug
          if [ $? -eq 0 ]; then
              _LOG_FLAG="succeeded"
          fi
          set -e
          
          _TIMESTAMP=$(date +%s)
          
          # Save proxy test log locally for artifact upload
          if [ -f proxy_regress.log ]; then
            mv proxy_regress.log "proxy-regress-${_TIMESTAMP}-${_LOG_FLAG}.log"
          fi
          
          # Springtail service logs (proxy)
          if [ "$(ls -A ${SPRINGTAIL_LOG_PATH})" ]; then
            tar -czf "proxy-springtail-svc-${_TIMESTAMP}.tar.gz" ${SPRINGTAIL_LOG_PATH}/*
          else
            echo "*** No Springtail Proxy Logs found inside ${SPRINGTAIL_LOG_PATH}"
          fi

          # Find regression diff files and copy them to the workspace for artifact upload
          regression_pg_diff_file=$(find /tmp -name "regression.diff.pg.out")
          if [ -f "$regression_pg_diff_file" ]; then
              cp $regression_pg_diff_file "regression_pg.diff.${_TIMESTAMP}.out"
          fi
          regression_proxy_diff_file=$(find /tmp -name "regression.diff.proxy.out")
          if [ -f "$regression_proxy_diff_file" ]; then
              cp $regression_proxy_diff_file "regression_proxy.diff.${_TIMESTAMP}.out"
          fi

          # Eventually fail the step
          if [ "$_LOG_FLAG" = "failed" ]; then
            regression_result_diff_file=$(find /tmp -name "regression_result.diff.out")
            if [ -f "$regression_result_diff_file" ]; then
                cp $regression_result_diff_file "regression_result.diff.${_TIMESTAMP}.out"
            fi
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.run_proxy_test && (success() || failure()) }}
        with:
          name: "Proxy Test Logs - ${{ inputs.config_to_run }}"
          path: |
            ./python/testing/proxy/proxy-regress-*.log
            ./python/testing/proxy/proxy-springtail-svc-*.tar.gz
            ./python/testing/proxy/regression_*.out

      - name: Clean up Volume and Network
        if: always()
        run: |
          docker rm -f pg16 || true
          docker volume rm ${DKR_VOLUME_NAME} || true
          docker network rm ${DKR_NETWORK_NAME} || true
