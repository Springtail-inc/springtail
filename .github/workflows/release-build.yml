name: Build Springtail Packages

on:
  workflow_call:
    inputs:
      num_procs:
        description: 'The number of processes to use for the build.'
        type: string
        required: true
      build_type:
        description: 'The type of build to perform.'
        type: string
      package_bucket_name:
        description: 'Legacy field, no longer used.'
        type: string
        required: false
      image_version_tag:
        description: 'The image version tag for the base builder to pull.'
        type: string
        required: true
      slack_webhook_url:
        type: string
        description: "The Slack webhook URL."
        required: true

jobs:
  build:
    name: Build Springtail Packages
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 30
    container:
      image: ${{ inputs.image_version_tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      ZIC: true
      NUM_PROCS: ${{ inputs.num_procs }}
      SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
      SLACK_CHANNEL: '#release'
      BUILD_TYPE: ${{ inputs.build_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build Springtail Service
        run: |
          git config --global --add safe.directory /__w/springtail/springtail
          if [ $BUILD_TYPE = "release" ]; then
            ./release.sh
          else
            ./debug.sh
          fi

      - name: Install the packages
        if: success()
        run: |
          cd "$BUILD_TYPE"
          make install

      - name: Package Build artifacts
        if: success()
        run: |
          git config --global --add safe.directory /__w/springtail/springtail
          ./package.sh
          {
            echo 'RELEASE_INFO<<EOF'
            cat install/INFO.txt
            echo 'EOF'
          } >> $GITHUB_ENV
          cd releases
          PKG_NAME="$(ls -t *.tgz | head -n1)"
          echo "PACKAGE_NAME=${PKG_NAME}" >> $GITHUB_ENV

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 'Release Package'
          path: ./releases/*.tgz

      - name: Notify Slack Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "text": ":tada: Springtail Release Package Built",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    {
                      "title": "Git SHA",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Build Artifacts",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Artifacts>",
                      "short": false
                    },
                    {
                        "title": "Release Info",
                        "value": "${{ env.RELEASE_INFO }}",
                        "short": false
                        }
                  ]
                }
              ]
            }

      - name: Upload Release info file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: install/INFO.txt
