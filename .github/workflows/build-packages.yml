name: Build Springtail Packages

on:
  push:
    branches:
      - jeff/package-build
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      num_procs:
        description: 'The number of processes to use for the build.'
        type: string
        default: "3"

permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  release-build:
    uses: ./.github/workflows/release-build.yml
    with:
      num_procs: ${{ inputs.inputs | 3 }}
      data_share_bucket_name: data-share.springtail.internal
      image_version_tag: ${{ vars.DEV_SUPPORT_ECR_REPO_URI }}:${{ vars.BUILDER_IMAGE_VERSION }}
      slack_webhook_url: "${{ secrets.GENERIC_SLACK_WEBHOOK_URL }}"
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"
