name: Build Springtail Container
on:
  workflow_call:
    inputs:
      base_image_tag:
        description: 'The image version tag for the base image to pull. Excluding the REPO URI. Example: service-d09837a'
        type: string
        required: true
      build_type:
        description: 'The type of build to perform. "release" or "debug". The type of build need to match the base image type.'
        type: string
        required: true
        default: "debug"
      push:
        description: 'Whether to push the built image to GHCR. If false, the image will only be loaded into the local Docker daemon. Otherwise it will be pushed to GHCR but not loaded locally.'
        type: boolean
        required: false
        default: true
      num_procs:
        description: 'The number of parallel processes to use for building and testing.'
        type: string
        required: false
        default: "4"
      output_image_tag:
        description: 'The tag to apply to the built image. Excluding the REPO URI. Example: service-1239837a'
        type: string
        required: false
        default: ""
      springtail_include_time_traces:
        description: 'Whether to include time traces in the Springtail build. This can be useful for performance analysis and debugging.'
        type: boolean
        required: false
        default: false
    outputs:
      output_image_tag:
        description: "The tag of the built image. Ready to use for the next steps."
        value: ${{ jobs.build-container.outputs.output_image_tag }}

permissions:
  contents: read
  packages: write

jobs:
  build-container:
    name: Build Springtail Container
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 20
    env:
      CI_BUILD_TYPE: ${{ inputs.build_type }}
      REGISTRY_URI: ghcr.io/springtail-inc
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      ZIC: true
      USER: root
      PYTHONUNBUFFERED: 1
      BASE_IMAGE_TAG: ${{ inputs.base_image_tag }}
      OUTPUT_IMAGE_TAG: ${{ inputs.output_image_tag }}
    outputs:
      output_image_tag: ${{ steps.prepare-build.outputs.output_image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare Build
        id: prepare-build
        run: |
          # Tag image with the run ID for uniqueness
          output_image_tag="${OUTPUT_IMAGE_TAG}"
          if [ -z "${OUTPUT_IMAGE_TAG}" ]; then
            # Generate a unique short random tag
            r=$(head /dev/urandom | tr -dc a-f0-9 | head -c6)
            output_image_tag="tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${r}"
          fi
          echo "output_image_tag=$output_image_tag" >> $GITHUB_OUTPUT
          
          # Figure out the build args (line separated for later use)
          if ${{ inputs.springtail_include_time_traces }}; then
            echo "Including time traces in Springtail build."
            echo "springtail_include_time_traces=SPRINGTAIL_INCLUDE_TIME_TRACES=true" >> $GITHUB_OUTPUT
          else
            echo "Time traces not included in Springtail build."
            echo "springtail_include_time_traces=SPRINGTAIL_INCLUDE_TIME_TRACES=false" >> $GITHUB_OUTPUT
          fi

      - name: Make registry-safe tag from ref_name
        id: slug
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          # normalize + replace invalids
          tag="$(printf '%s' "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^[.-]+//; s/[.-]+$//')"
          
          # ensure non-empty
          if [ -z "$tag" ]; then tag="ref"; fi
          
          # enforce 128-char limit; keep uniqueness with an 8-char hash if truncated
          if [ ${#tag} -gt 128 ]; then
            head="${tag:0:110}"
            hash="$(printf '%s' "$raw" | sha1sum | cut -c1-8)"
            tag="${head}-${hash}"
            tag="${tag:0:128}"
          fi
          
          echo "tag=cache-$tag" >> "$GITHUB_OUTPUT"

      - name: Docker Build Push Action
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          file: .github/workflows/Dockerfile.build
          platforms: linux/arm64
          provenance: false
          sbom: false
          outputs: >
            type=registry,
            oci-mediatypes=true,
            compression=zstd,           # much faster than gzip
            compression-level=3,        # good speed/size tradeoff
            force-compression=true
          cache-from: type=registry,ref=ghcr.io/springtail-inc/cache-latest
          cache-to: type=inline
          tags: |
            ghcr.io/springtail-inc/${{ steps.prepare-build.outputs.output_image_tag }}
            ghcr.io/springtail-inc/${{ steps.slug.outputs.tag }}
          build-args: |
            BASE_IMAGE=ghcr.io/springtail-inc/${{ inputs.base_image_tag }}
            CI_BUILD_TYPE=${{ inputs.build_type }}
            NCORES=${{ inputs.num_procs }}
            ${{ steps.prepare-build.outputs.springtail_include_time_traces }}

      - name: Clean up secrets
        if: always()
        run: |
          docker logout ghcr.io
          rm -f $HOME/.ssh $HOME/.git-credentials

