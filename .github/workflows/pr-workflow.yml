name: PR Actions (PR to Main)

on:
  pull_request:
    types: [ opened, synchronize, ready_for_review ]
    branches:
      - main
  workflow_dispatch:


permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  system-settings-check:
    uses: ./.github/workflows/system-settings-check.yml
    with:
      canonical_copy: 'system.json.settings'
      target_files: 'prod.system.settings.json'

  build:
    uses: ./.github/workflows/rw-build-container.yml
    needs: [ system-settings-check ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      base_image_tag: ci-debug-202509091508-gold
      build_type: "debug"
      num_procs: "6"
      push: true
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  unit-test:
    uses: ./.github/workflows/rw-run-unit-test.yml
    needs: [ build ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      image_tag: ${{ needs.build.outputs.output_image_tag }}
      s3_log_prefix: "testlogs/${{ github.event.pull_request.number }}"
      build_type: "debug"
      reuse_code: true
      timeout_minutes: 20
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  integration-test-p1:
    uses: ./.github/workflows/rw-run-integration-test.yml
    needs: [ build ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      image_tag: ${{ needs.build.outputs.output_image_tag }}
      config_to_run: "github_ci_p1"
      s3_log_prefix: "testlogs/${{ github.event.pull_request.number }}"
      build_type: "debug"
      reuse_code: true
      timeout_minutes: 20
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  integration-test-p2:
    uses: ./.github/workflows/rw-run-integration-test.yml
    needs: [ build ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      image_tag: ${{ needs.build.outputs.output_image_tag }}
      config_to_run: "github_ci_p2"
      s3_log_prefix: "testlogs/${{ github.event.pull_request.number }}"
      build_type: "debug"
      reuse_code: true
      timeout_minutes: 20
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  integration-test-p3:
    uses: ./.github/workflows/rw-run-integration-test.yml
    needs: [ build ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      image_tag: ${{ needs.build.outputs.output_image_tag }}
      config_to_run: "github_ci_p3"
      s3_log_prefix: "testlogs/${{ github.event.pull_request.number }}"
      build_type: "debug"
      reuse_code: true
      timeout_minutes: 20
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  integration-test-p4:
    uses: ./.github/workflows/rw-run-integration-test.yml
    needs: [ build ]
    if: ${{ github.event.pull_request.draft == false }}
    with:
      image_tag: ${{ needs.build.outputs.output_image_tag }}
      config_to_run: "github_ci_p4"
      s3_log_prefix: "testlogs/${{ github.event.pull_request.number }}"
      build_type: "debug"
      reuse_code: true
      timeout_minutes: 20
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"

  integration-test-join:
    needs: [ integration-test-p1, integration-test-p2, integration-test-p3, integration-test-p4 ]
    runs-on: ubuntu-latest
    # only run if non of the Integration tests is skipped
    if: ${{ github.event.pull_request.draft == false && (needs.integration-test-p1.result != 'skipped' && needs.integration-test-p2.result != 'skipped' && needs.integration-test-p3.result != 'skipped' && needs.integration-test-p4.result != 'skipped') }}
    outputs:
      test_log_s3_uri: ${{ steps.set_outputs.outputs.test_log_s3_uri }}
      springtail_log_s3_uris: ${{ steps.set_outputs.outputs.springtail_log_s3_uris }}
      agg_result: ${{ needs.integration-test-p1.result == 'success' && needs.integration-test-p2.result == 'success' && needs.integration-test-p3.result == 'success' && needs.integration-test-p4.result == 'success' && 'success' || 'failure' }}

    steps:
      - name: Set Outputs
        id: set_outputs
        run: |
          echo "test_log_s3_uris='${{ needs.integration-test-p1.outputs.test_log_s3_uri }} ; ${{ needs.integration-test-p2.outputs.test_log_s3_uri }} ; ${{ needs.integration-test-p3.outputs.test_log_s3_uri }} ; ${{ needs.integration-test-p4.outputs.test_log_s3_uri }}'" >> $GITHUB_OUTPUT
          echo "springtail_log_s3_uris='${{ needs.integration-test-p1.outputs.springtail_log_s3_uri }} ; ${{ needs.integration-test-p2.outputs.springtail_log_s3_uri }} ; ${{ needs.integration-test-p3.outputs.springtail_log_s3_uri }} ; ${{ needs.integration-test-p4.outputs.springtail_log_s3_uri }}'" >> $GITHUB_OUTPUT

  slack-notification:
    uses: ./.github/workflows/rw-notify-slack.yml
    needs: [ unit-test, integration-test-join ]
    # Only if non of the tests is skipped
    if: ${{ github.event.pull_request.draft == false && (needs.unit-test.result != 'skipped' && needs.integration-test-join.result != 'skipped') }}
    with:
      slack_webhook_url: ${{ vars.GENERIC_SLACK_WEBHOOK_URL }}
      # Need to create a new channel for PR notifications.
      slack_channel: "#github-prs"
      text: >-
        PR #${{ github.event.pull_request.number }} (<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>) 
        by ${{ github.event.pull_request.user.login }} has completed the CI workflow
      attachment: |
        {
          "color": "${{ needs.unit-test.result == 'success' && needs.integration-test-join.agg_result == 'success' && 'good' || 'danger' }}",
          "fields": [
            {
              "title": "Unit Test",
              "value": "${{ needs.unit-test.result }}; \nlogs: ${{ needs.unit-test.outputs.test_log_s3_uri }}",
              "short": false
            },
            {
              "title": "Integration Test",
              "value": "${{ needs.integration-test.agg_result }}; \ntest logs: ${{ needs.integration-test-join.outputs.test_log_s3_uris }}\nspringtail logs: ${{ needs.integration-test-join.outputs.springtail_log_s3_uris }}",
              "short": false
            }
          ]
        }
        

