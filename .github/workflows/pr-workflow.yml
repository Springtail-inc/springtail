name: PR Actions (PR to Main)

on:
  pull_request:
    types: [ opened, ready_for_review ]
    branches:
      - main
  workflow_dispatch:


permissions:
  id-token: write
  contents: read
  checks: write

jobs:
  test:
    if: |
      github.event.pull_request != null && (
        github.event.action == 'ready_for_review' || 
        (github.event.pull_request.draft == false && github.event.action == 'opened')
      )
    uses: ./.github/workflows/test.yml
    with:
      builder_image_version_tag: ${{ vars.DEV_SUPPORT_ECR_REPO_URI }}:${{ vars.BUILDER_IMAGE_VERSION }}
      num_procs: "${{ vars.NUM_PROCS }}"
      ref: ${{ github.event.pull_request.head.ref }}
    secrets:
      aws_role_arn: "${{ secrets.DEV_AWS_ROLE_ARN }}"
      aws_ecr_docker_password: "${{ secrets.DEV_SUPPORT_ECR_PW }}"
