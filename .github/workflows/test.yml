# A reusable workflow that runs tests on the code.
name: Test

on:
  workflow_call:
    inputs:
      builder_image_version_tag:
        description: 'The image version tag for the base builder to pull.'
        type: string
        required: true
      num_procs:
        description: 'The number of processes to use for the build.'
        type: string
        default: "4"
    secrets:
      aws_role_arn:
        description: "The ARN of the role to assume."
        required: true
      aws_ecr_docker_password:
        description: "The password for the ECR docker registry."
        required: true

jobs:
  test:
    name: test
    runs-on: warp-ubuntu-latest-arm64-8x-spot
    timeout-minutes: 30
    container:
      image: ${{ inputs.builder_image_version_tag }}
      credentials:
        username: AWS
        password: ${{ secrets.aws_ecr_docker_password }}

    env:
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_ROOT: /home/dev/external/vcpkg
      DOCKER: 1
      ZIC: true
      USER: root
      PYTHONUNBUFFERED: 1
      GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_LATEST_SHA: ${{ github.event.pull_request.head.sha }}
      NUM_PROCS: ${{ inputs.num_procs }}
    steps:
      - name: Clean up
        run: |
          rm -f /opt/springtail/pids/*
          rm -f /__w/springtail/springtail/*.{log,gz,xml}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: install-aws-cli-action
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2                         # default
          verbose: false                     # default
          arch: arm64

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          role-session-name: tempSession
          aws-region: us-east-1

      - name: Prepare Tests
        run: |
          git config --global --add safe.directory /__w/springtail/springtail
          cp system.json.settings system.json.test
          mkdir -p /opt/springtail/pids
          service redis-server start
          
          # Copies over the fdw_config file to the designated location
          conf_file=/etc/postgresql/16/main/postgresql.conf
          fdw_config_file_path=$(grep -E "^springtail_fdw.config_file_path" $conf_file | awk '{print $3}' | tr -d "'")
          mkdir -p $(dirname $fdw_config_file_path)
          cp system.json.settings $fdw_config_file_path

      - name: Build
        run: |
          ln -s /home/dev/external external
          ./debug.sh -j ${NUM_PROCS}

      - name: Prepare DB for Unit Tests
        run: |
          service postgresql start
          USER_EXISTS=$(sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='springtail'")
          if [ "$USER_EXISTS" != "1" ]; then
            sudo -u postgres psql -c "CREATE USER springtail WITH PASSWORD 'springtail' SUPERUSER LOGIN" 
          fi
          sudo -u postgres psql -c "CREATE DATABASE springtail WITH OWNER springtail"
          # Create triggers
          sudo -u postgres psql -d springtail -f /__w/springtail/springtail/scripts/triggers.sql

      - name: Cleanup Unit Test
        if: success() || failure()      # run this step even if previous step failed
        run: |
          # Drop the springtail database 
          sudo -u postgres psql -c "DROP DATABASE springtail"
          service postgresql stop

      - name: Create Superuser for test
        if: success() || failure()      # run this step even if previous step failed
        run: |
          service postgresql start
          USER_EXISTS=$(sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='springtail'")
          if [ "$USER_EXISTS" != "1" ]; then
            sudo -u postgres psql -c "CREATE USER springtail WITH PASSWORD 'springtail' SUPERUSER LOGIN" 
          fi
          service postgresql stop

      - name: Run Integration Tests
        if: success() || failure()      # run this step even if previous step failed
        run: |
          set -x
          cd python/testing
          service postgresql start
          ./startup.sh -s data_init.sql
          
          python3 test_runner.py -c config.yaml -j /__w/springtail/springtail/integration-test-report.xml 2>&1 | tee tmplog
          
          # Grab the success/failure status of the integration tests
          _LOG_FLAG="succeeded"
          if grep -qE "Tests failed: [1-9][0-9]*" tmplog
          then 
            _LOG_FLAG="failed"
          fi
          # Timestamp
          _LOG_TIMESTAMP=$(date +%s)
          _LOG_DATE=$(date +"%Y/%m/%d/%H")
          
          # Grab the current PR ID
          _LOG_PR_ID="${GITHUB_EVENT_PULL_REQUEST_NUMBER}"
          # Grab the short SHA
          _LOG_SHA=$(echo $GITHUB_LATEST_SHA | cut -c1-7)
          
          log_file="integration-test-${_LOG_PR_ID}-${_LOG_SHA}-${_LOG_FLAG}-${_LOG_TIMESTAMP}.log" 
          mv tmplog $log_file
          
          # Integration test log
          integration_test_log_s3key="s3://devsupport.springtail.internal/testlogs/${_LOG_DATE}/$log_file"
          aws s3 cp "$log_file" "$integration_test_log_s3key"
          echo "*** Integration Test Log S3 Key: $integration_test_log_s3key"
          
          # Springtail service log
          springtail_log_file="springtail-${_LOG_PR_ID}-${_LOG_SHA}-${_LOG_FLAG}-${_LOG_TIMESTAMP}.tar.gz"
          echo "*** Springtail log: ${springtail_log_file}"
          output=$(python3 springtail.py --dump -f ../../system.json.test -b ../../debug)
          echo "*** output {output}"
          fname=$(echo $output  | cut -f2 -d':' | xargs | head -1)
          mv $fname $springtail_log_file
          springtail_log_s3key="s3://devsupport.springtail.internal/testlogs/${_LOG_DATE}/$springtail_log_file"
          aws s3 cp "$springtail_log_file" "$springtail_log_s3key"
          echo "*** Springtail Log S3 Key: $springtail_log_s3key"

      - name: Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()                         # run this step even if previous step failed
        with:
          name: Integration Tests (test_runner)            # Name of the check run which will be created
          path: ./integration-test-report.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: success() || failure()      # run this step even if previous step failed
        with:
          name: 'Integration Test Logs'
          path: ./python/testing/integration-test-*.log

      - uses: actions/upload-artifact@v4
        if: success() || failure()      # run this step even if previous step failed
        with:
          name: 'Springtail Logs'
          path: ./python/testing/springtail-*.tar.gz
