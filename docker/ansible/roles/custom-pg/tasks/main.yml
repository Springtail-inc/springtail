---
- name: Update the package cache & upgrade
  ansible.builtin.apt:
    update_cache: yes
    upgrade: yes

- name: Install PG Deps
  ansible.builtin.apt:
    name:
      - postgresql-client-common
      - postgresql-common
      - libllvm19
      - ssl-cert
      - locales-all
      - sysstat
    state: present

- name: Check if PG tarball already exists (from local build)
  ansible.builtin.stat:
    path: /tmp/springtail-pg.tar.gz
  register: pg_tarball

- name: Download Custom PG build from Custom URL
  ansible.builtin.get_url:
    url: "{{ custom_pg_package_url }}"
    dest: /tmp/springtail-pg.tar.gz
    mode: '0644'
  when: not pg_tarball.stat.exists

- name: Copy to remote host
  ansible.builtin.copy:
    src: /tmp/springtail-pg.tar.gz
    dest: /tmp/springtail-pg.tar.gz

- name: Install PG build dependencies
  ansible.builtin.apt:
    name:
      - libreadline-dev
      - zlib1g-dev
      - libssl-dev
      - libxml2-dev
      - libxslt1-dev
      - libicu-dev
      - libsystemd-dev
      - liblz4-dev
      - libzstd-dev
      - uuid-dev
      - bison
      - flex
    state: present

- name: Build and install Custom PG from source
  ansible.builtin.shell: |
    set -e
    cd /tmp
    tar xzf springtail-pg.tar.gz
    cd postgresql-16.9
    ./configure \
      --prefix=/usr/lib/postgresql/16 \
      --bindir=/usr/lib/postgresql/16/bin \
      --datadir=/usr/share/postgresql/16 \
      --sysconfdir=/etc/postgresql-common \
      --libdir=/usr/lib/postgresql/16/lib \
      --includedir=/usr/include/postgresql/16 \
      --with-openssl \
      --with-libxml \
      --with-libxslt \
      --with-icu \
      --with-uuid=e2fs \
      --with-lz4 \
      --with-zstd \
      --with-systemd \
      --with-pgport=5432
    make -j$(nproc) world
    make install-world
    # Link system zoneinfo as PG timezone data (source tarball lacks timezone source files)
    ln -sfn /usr/share/zoneinfo /usr/share/postgresql/16/timezone
    cd /tmp
    rm -rf postgresql-16.9 springtail-pg.tar.gz

- name: Enable PG16
  ansible.builtin.copy:
    dest: /etc/postgresql/16/main/start.conf
    content: "auto\n"
    owner: postgres
    group: postgres
    mode: '0644'

- name: Enable Unix Socket for PostgresSQL
  ansible.builtin.shell: |
    chmod a+rwx /var/run/postgresql

- name: Creates a Superuser for PostgresSQL
  become: yes
  become_user: postgres
  ansible.builtin.shell: |
    pg_ctlcluster 16 main start
    psql -c "CREATE ROLE {{ superuser_name }} WITH LOGIN SUPERUSER PASSWORD '{{ superuser_password }}';"
    pg_ctlcluster 16 main stop
