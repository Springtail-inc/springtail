---
- name: Ensure the destination directory exists
  ansible.builtin.file:
    path: /var/springtail/ansible
    state: directory
    owner: springtail
    group: springtail
    mode: '0755'

- name: Copy over the post-launch playbook
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /var/springtail/ansible/
    mode: '0755'
  loop:
    - init-playbook.yml