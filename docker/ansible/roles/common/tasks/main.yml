- name: Install core packages
  ansible.builtin.apt:
    name:
      - autoconf
      - binutils-dev
      - bison
      - build-essential
      - ca-certificates
      - clang-format
      - cmake
      - curl
      - dnsutils
      - emacs-nox
      - flex
      - g++-14
      - gcc-14
      - gdb
      - git
      - gnupg
      - gpg
      - htop
      - iftop
      - iproute2
      - iputils-ping
      - jq
      - libbsd-dev
      - libdw-dev
      - libdwarf-dev
      - libelf-dev
      - linux-libc-dev
      - lsb-release
      - net-tools
      - netcat
      - ninja-build
      - nmap
      - openssh-server
      - pkg-config
      - postgresql-16
      - postgresql-contrib-16
      - procps
      - python3
      - python3-boto3
      - python3-jinja2
      - python3-lxml
      - python3-pip
      - python3-psutil
      - python3-psycopg2
      - python3-redis
      - python3-requests
      - python3-yaml
      - redis-server
      - software-properties-common
      - sudo
      - tar
      - traceroute
      - unzip
      - vim
      - wget
      - zip

    update_cache: true
    state: present
    autoclean: true

- name: Set timezone non-interactively
  ansible.builtin.apt:
    name: tzdata
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Allow ptrace by lowering kernel.yama.ptrace_scope
  ansible.builtin.replace:
    path: /etc/sysctl.d/10-ptrace.conf
    regexp: '^kernel.yama.ptrace_scope\s*=\s*1'
    replace: 'kernel.yama.ptrace_scope = 0'
